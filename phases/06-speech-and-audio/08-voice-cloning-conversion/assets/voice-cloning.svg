<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">three voice-cloning archetypes — pick by reference length, license, and consent</text>

  <rect x="30" y="55" width="265" height="180" class="box"/>
  <text x="162" y="78" text-anchor="middle" class="label">A. zero-shot cloning</text>
  <text x="162" y="96" text-anchor="middle" class="tag">F5-TTS · VibeVoice · VALL-E</text>
  <text x="50" y="124" class="content">ref_audio + ref_text + gen_text</text>
  <text x="50" y="142" class="content">  →  flow-matching / AR LM</text>
  <text x="50" y="160" class="content">  →  gen_audio in ref voice</text>
  <text x="50" y="186" class="caption">10-30 s reference · instant</text>
  <text x="50" y="204" class="caption">MOS 4.1-4.3 · spk-sim 0.72-0.81</text>

  <rect x="305" y="55" width="265" height="180" class="box"/>
  <text x="437" y="78" text-anchor="middle" class="label">B. voice conversion</text>
  <text x="437" y="96" text-anchor="middle" class="tag">kNN-VC · OpenVoice V2</text>
  <text x="325" y="124" class="content">source speech (speaker A)</text>
  <text x="325" y="142" class="content">  →  WavLM features</text>
  <text x="325" y="160" class="content">  →  kNN over target pool (B)</text>
  <text x="325" y="178" class="content">  →  vocoder  →  speech in B</text>
  <text x="325" y="205" class="caption">preserves prosody + timing + content</text>
  <text x="325" y="222" class="caption">only timbre changes</text>

  <rect x="580" y="55" width="265" height="180" class="hot"/>
  <text x="712" y="78" text-anchor="middle" class="label">C. speaker adaptation</text>
  <text x="712" y="96" text-anchor="middle" class="tag">XTTS + LoRA · VITS fine-tune</text>
  <text x="600" y="124" class="content">10-60 min target audio</text>
  <text x="600" y="142" class="content">  →  LoRA / full fine-tune</text>
  <text x="600" y="160" class="content">  →  per-speaker checkpoint</text>
  <text x="600" y="186" class="caption">MOS +0.7 over zero-shot</text>
  <text x="600" y="204" class="caption">captures pacing, emotion, dialect</text>
  <text x="600" y="222" class="caption">slow training; permanent artifact</text>

  <rect x="30" y="260" width="815" height="170" class="box"/>
  <text x="437" y="282" text-anchor="middle" class="label">2026 consent + safety checklist — NON-NEGOTIABLE</text>
  <text x="60" y="310" class="content">1. explicit recorded consent before cloning any real person — log, retain 7+ years</text>
  <text x="60" y="330" class="content">2. ship AudioSeal (or equivalent) watermark on every cloned output</text>
  <text x="60" y="350" class="content">3. refuse named-entity prompts (celebrities, politicians, dead people, minors)</text>
  <text x="60" y="370" class="content">4. require SNR &gt; 20 dB mono reference — YouTube rips do not count as consent</text>
  <text x="60" y="390" class="content">5. rate-limit + abuse monitoring; kill-switch on anomalous volume</text>
  <text x="60" y="410" class="content">6. disclose to end-listener in-band (AI-generated audio tag + metadata)</text>
</svg>
